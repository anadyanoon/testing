<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STILL">
<meta name="description" content="A calm emotional space. Mood rooms, ambient sound, and words to breathe by.">
<title>STILL</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Suisse+Intl:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
  --ease-in-out:cubic-bezier(0.45,0,0.55,1);
  --room-bg:#0a0a0f;
  --room-accent:#ffffff18;
  --room-text:#ffffff;
  --room-muted:#ffffff66;
  --room-glow:rgba(200,200,255,0.06);
  --room-particle:rgba(255,255,255,0.12);
  --transition:0.9s var(--ease-out-expo);
  font-size:16px;
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#0a0a0f;
  color:#fff;
  font-family:'Cormorant Garamond',Georgia,serif;
  -webkit-font-smoothing:antialiased;
  user-select:none;
}
canvas#bg{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0a0a0f;
  transition:opacity 1.2s ease,visibility 1.2s ease;
}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none;}
.splash-word{
  font-size:clamp(3.5rem,12vw,7rem);
  font-weight:300;letter-spacing:0.5em;
  color:#fff;text-transform:uppercase;
  animation:fadeUp 1.4s var(--ease-out-expo) both;
}
.splash-sub{
  margin-top:1.5rem;font-size:0.85rem;letter-spacing:0.35em;
  color:#ffffff55;text-transform:uppercase;font-family:'Cormorant Garamond',serif;font-style:italic;
  animation:fadeUp 1.4s 0.3s var(--ease-out-expo) both;
}
.splash-enter{
  margin-top:3rem;
  background:none;border:0.5px solid #ffffff33;color:#ffffff88;
  padding:0.75rem 2.5rem;border-radius:50px;
  font-family:'Cormorant Garamond',serif;font-size:1rem;letter-spacing:0.2em;
  cursor:pointer;transition:all 0.4s ease;
  text-transform:uppercase;
  animation:fadeUp 1.4s 0.6s var(--ease-out-expo) both;
}
.splash-enter:hover{background:#ffffff11;border-color:#ffffff66;color:#fff;}

/* ── APP SHELL ── */
#app{
  position:fixed;inset:0;z-index:1;
  display:flex;flex-direction:column;
  opacity:0;transition:opacity 1s ease;
  pointer-events:none;
}
#app.active{opacity:1;pointer-events:all;}

/* ── ROOM LAYER ── */
#room-overlay{
  position:fixed;inset:0;z-index:1;
  transition:background 2.5s ease,opacity 2s ease;
  pointer-events:none;
}

/* ── QUOTE ── */
#quote-wrap{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:10;width:min(600px,88vw);text-align:center;
  pointer-events:none;
}
#quote-text{
  font-size:clamp(1.4rem,3.5vw,2rem);
  font-weight:300;font-style:italic;
  line-height:1.65;color:#ffffffcc;
  letter-spacing:0.01em;
  transition:opacity 0.8s ease,transform 0.8s var(--ease-out-expo);
}
#quote-text.hidden{opacity:0;transform:translateY(10px);}
#quote-attr{
  margin-top:1.2rem;font-size:0.8rem;letter-spacing:0.25em;
  color:#ffffff44;text-transform:uppercase;font-family:'Cormorant Garamond',serif;
  transition:opacity 0.8s ease;
}
#quote-attr.hidden{opacity:0;}

/* ── ROOMS BAR ── */
#rooms-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:0 1.5rem 2rem;
  display:flex;flex-direction:column;align-items:center;gap:1rem;
}
#rooms-scroll{
  display:flex;gap:0.75rem;overflow-x:auto;
  scrollbar-width:none;max-width:100%;
  padding:0.25rem;
}
#rooms-scroll::-webkit-scrollbar{display:none;}
.room-btn{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;gap:0.4rem;
  background:rgba(255,255,255,0.07);
  border:0.5px solid rgba(255,255,255,0.15);
  border-radius:16px;padding:0.9rem 1.1rem;
  cursor:pointer;transition:all 0.4s ease;min-width:80px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.room-btn:hover{background:rgba(255,255,255,0.13);border-color:rgba(255,255,255,0.3);}
.room-btn.active{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.5);}
.room-icon{font-size:1.4rem;line-height:1;}
.room-name{font-size:0.65rem;letter-spacing:0.18em;color:#ffffff99;text-transform:uppercase;font-family:'Cormorant Garamond',serif;}
.room-btn.active .room-name{color:#ffffffcc;}

/* ── CONTROLS ── */
#controls{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:env(safe-area-inset-top,1rem) 1.5rem 0.75rem;
}
.ctrl-btn{
  background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);
  border-radius:50%;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s ease;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#ffffff88;font-size:1rem;
}
.ctrl-btn:hover{background:rgba(255,255,255,0.14);color:#fff;}
#logo{
  font-size:0.8rem;letter-spacing:0.5em;color:#ffffff55;
  text-transform:uppercase;font-family:'Cormorant Garamond',serif;
}

/* ── SOUND PANEL ── */
#sound-panel{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:30;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  opacity:0;pointer-events:none;transition:opacity 0.4s ease;
}
#sound-panel.open{opacity:1;pointer-events:all;}
.panel-card{
  background:rgba(255,255,255,0.06);
  border:0.5px solid rgba(255,255,255,0.15);
  border-radius:24px;padding:2rem;
  width:min(420px,90vw);
}
.panel-title{
  font-size:0.75rem;letter-spacing:0.3em;color:#ffffff55;
  text-transform:uppercase;margin-bottom:1.5rem;
}
.sound-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.8rem 0;border-bottom:0.5px solid rgba(255,255,255,0.08);
}
.sound-item:last-child{border-bottom:none;}
.sound-label{font-size:1rem;font-style:italic;color:#ffffffbb;}
.sound-controls{display:flex;align-items:center;gap:0.75rem;}
.vol-slider{
  -webkit-appearance:none;appearance:none;
  width:90px;height:2px;border-radius:1px;
  background:rgba(255,255,255,0.2);outline:none;cursor:pointer;
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:#fff;cursor:pointer;
}
.sound-toggle{
  background:none;border:0.5px solid rgba(255,255,255,0.25);
  border-radius:50%;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s;color:#ffffff88;font-size:0.85rem;
}
.sound-toggle.on{background:rgba(255,255,255,0.2);color:#fff;border-color:#ffffff66;}
.panel-close{
  margin-top:1.5rem;width:100%;background:rgba(255,255,255,0.08);
  border:0.5px solid rgba(255,255,255,0.15);border-radius:12px;
  padding:0.75rem;color:#ffffffbb;font-family:'Cormorant Garamond',serif;
  font-size:0.9rem;letter-spacing:0.15em;cursor:pointer;
  text-transform:uppercase;transition:all 0.3s;
}
.panel-close:hover{background:rgba(255,255,255,0.14);}

/* ── BREATHE ── */
#breathe-wrap{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:9;pointer-events:none;
}
#breathe-ring{
  width:180px;height:180px;border-radius:50%;
  border:0.5px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  animation:breathe 8s ease-in-out infinite;
  background:radial-gradient(circle,rgba(255,255,255,0.015) 0%,transparent 70%);
}
@keyframes breathe{
  0%,100%{transform:scale(0.85);opacity:0.4;}
  50%{transform:scale(1.15);opacity:0.9;}
}

/* ── EDIT MODAL ── */
#edit-panel{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:40;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  opacity:0;pointer-events:none;transition:opacity 0.4s ease;overflow-y:auto;
}
#edit-panel.open{opacity:1;pointer-events:all;}
.edit-card{
  background:rgba(20,18,30,0.95);
  border:0.5px solid rgba(255,255,255,0.15);
  border-radius:24px;padding:2rem;
  width:min(520px,92vw);margin:2rem auto;
}
.edit-section{margin-bottom:1.75rem;}
.edit-label{font-size:0.7rem;letter-spacing:0.3em;color:#ffffff55;text-transform:uppercase;margin-bottom:0.6rem;display:block;}
.edit-input,.edit-textarea{
  width:100%;background:rgba(255,255,255,0.06);
  border:0.5px solid rgba(255,255,255,0.15);border-radius:10px;
  padding:0.7rem 1rem;color:#ffffffcc;
  font-family:'Cormorant Garamond',serif;font-size:1rem;
  outline:none;resize:vertical;transition:border 0.3s;
}
.edit-input:focus,.edit-textarea:focus{border-color:rgba(255,255,255,0.4);}
.edit-textarea{min-height:120px;line-height:1.6;}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.color-pick-wrap{display:flex;align-items:center;gap:0.75rem;}
input[type="color"]{
  width:40px;height:40px;border:none;padding:0;border-radius:8px;cursor:pointer;
  background:none;overflow:hidden;
}
.edit-save{
  width:100%;background:rgba(255,255,255,0.12);
  border:0.5px solid rgba(255,255,255,0.3);border-radius:12px;
  padding:0.85rem;color:#fff;font-family:'Cormorant Garamond',serif;
  font-size:1rem;letter-spacing:0.15em;cursor:pointer;
  text-transform:uppercase;transition:all 0.3s;margin-top:0.5rem;
}
.edit-save:hover{background:rgba(255,255,255,0.2);}
.edit-cancel{
  width:100%;background:none;border:none;
  padding:0.75rem;color:#ffffff44;font-family:'Cormorant Garamond',serif;
  font-size:0.85rem;cursor:pointer;letter-spacing:0.15em;text-transform:uppercase;
}

/* ── QUOTE NAV ── */
#quote-nav{
  position:fixed;bottom:8rem;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:1rem;align-items:center;
}
.qnav-btn{
  background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);
  border-radius:50%;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#ffffff55;font-size:0.85rem;
  transition:all 0.3s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.qnav-btn:hover{background:rgba(255,255,255,0.14);color:#fff;}
#quote-dots{display:flex;gap:0.4rem;align-items:center;}
.qdot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.25);transition:all 0.3s;}
.qdot.active{background:#fff;width:16px;border-radius:2px;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:12rem;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);
  border-radius:50px;padding:0.5rem 1.25rem;
  font-size:0.78rem;letter-spacing:0.12em;color:#ffffffbb;
  backdrop-filter:blur(12px);z-index:50;
  opacity:0;transition:opacity 0.4s;pointer-events:none;
  text-transform:uppercase;font-family:'Cormorant Garamond',serif;
}
#toast.show{opacity:1;}

/* ── MOBILE ── */
@media(max-width:480px){
  .edit-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- BACKGROUND CANVAS -->
<canvas id="bg"></canvas>

<!-- ROOM COLOUR OVERLAY -->
<div id="room-overlay"></div>

<!-- BREATHING RING -->
<div id="breathe-wrap"><div id="breathe-ring"></div></div>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-word">Still</div>
  <div class="splash-sub">a space to breathe</div>
  <button class="splash-enter" onclick="enter()">Enter</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- APP -->
<div id="app">

  <!-- TOP CONTROLS -->
  <div id="controls">
    <button class="ctrl-btn" onclick="openSound()" title="Sounds">♬</button>
    <div id="logo">Still</div>
    <button class="ctrl-btn" onclick="openEdit()" title="Customise">✦</button>
  </div>

  <!-- QUOTE -->
  <div id="quote-wrap">
    <div id="quote-text"></div>
    <div id="quote-attr"></div>
  </div>

  <!-- QUOTE NAVIGATION -->
  <div id="quote-nav">
    <button class="qnav-btn" onclick="prevQuote()">‹</button>
    <div id="quote-dots"></div>
    <button class="qnav-btn" onclick="nextQuote()">›</button>
  </div>

  <!-- ROOMS BAR -->
  <div id="rooms-bar">
    <div id="rooms-scroll"></div>
  </div>

</div>

<!-- SOUND PANEL -->
<div id="sound-panel">
  <div class="panel-card">
    <div class="panel-title">Soundscape</div>
    <div id="sound-list"></div>
    <button class="panel-close" onclick="closeSound()">Close</button>
  </div>
</div>

<!-- EDIT PANEL -->
<div id="edit-panel">
  <div class="edit-card">
    <div class="edit-section">
      <span class="edit-label">App name</span>
      <input class="edit-input" id="e-name" type="text" placeholder="STILL">
    </div>
    <div class="edit-section">
      <span class="edit-label">Quotes — one per line (text | Author)</span>
      <textarea class="edit-textarea" id="e-quotes" style="min-height:160px"></textarea>
    </div>
    <div class="edit-section">
      <span class="edit-label">Rooms — one per line (Emoji | Name | Color hex)</span>
      <textarea class="edit-textarea" id="e-rooms" style="min-height:130px"></textarea>
    </div>
    <div class="edit-section">
      <span class="edit-label">Breathing ring speed</span>
      <div style="display:flex;align-items:center;gap:1rem;">
        <input type="range" class="vol-slider" style="width:100%;" id="e-breathe" min="4" max="20" step="1">
        <span id="e-breathe-val" style="color:#ffffff88;font-size:0.85rem;min-width:2rem;"></span>
      </div>
    </div>
    <div class="edit-section">
      <span class="edit-label">Your message to visitors</span>
      <input class="edit-input" id="e-msg" type="text" placeholder="You are safe here.">
    </div>
    <button class="edit-save" onclick="saveEdit()">Save changes</button>
    <button class="edit-cancel" onclick="closeEdit()">Cancel</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   STILL — Core App
   All customisation stored in localStorage.
   No backend. No API. Pure browser.
═══════════════════════════════════════════════ */

/* ── DEFAULTS ── */
const DEFAULTS = {
  appName: 'Still',
  welcomeMsg: 'You are safe here.',
  breatheSpeed: 8,
  rooms: [
    { icon:'🌊', name:'Ocean',   color:'#0d2b45', particle:'rgba(100,180,255,0.15)' },
    { icon:'🌿', name:'Forest',  color:'#0d1f15', particle:'rgba(100,200,120,0.13)' },
    { icon:'🌙', name:'Night',   color:'#080818', particle:'rgba(150,130,255,0.12)' },
    { icon:'☀️', name:'Dawn',    color:'#2a1510', particle:'rgba(255,180,80,0.12)'  },
    { icon:'🌸', name:'Bloom',   color:'#1e0f1a', particle:'rgba(255,150,200,0.13)' },
    { icon:'❄️', name:'Frost',   color:'#0e1825', particle:'rgba(180,220,255,0.14)' },
    { icon:'🔥', name:'Ember',   color:'#1a0b00', particle:'rgba(255,120,40,0.13)'  },
    { icon:'⛅', name:'Cloud',   color:'#12151a', particle:'rgba(200,200,220,0.1)'  },
  ],
  quotes: [
    { text:'You do not have to be good.', attr:'Mary Oliver' },
    { text:'Breathing in, I calm body and mind. Breathing out, I smile.', attr:'Thich Nhat Hanh' },
    { text:'Rest is not idle. Rest is the thing that allows the next moment.', attr:'' },
    { text:'Be still and know.', attr:'Psalm 46:10' },
    { text:'The present moment is the only moment available to us.', attr:'Thich Nhat Hanh' },
    { text:'Even if you cannot change all the people around you, you can change the people you choose to be around.', attr:'James Baldwin' },
    { text:'Nothing is so strong as gentleness, nothing so gentle as real strength.', attr:'St. Francis de Sales' },
    { text:'You are allowed to be both a masterpiece and a work in progress.', attr:'Sophia Bush' },
    { text:'What you seek is seeking you.', attr:'Rumi' },
    { text:'Let yourself be silently drawn by the strange pull of what you really love.', attr:'Rumi' },
    { text:'Peace is this moment without judgement.', attr:'Dorothy Hunt' },
    { text:'In the middle of difficulty lies opportunity.', attr:'Albert Einstein' },
    { text:'The wound is the place where the Light enters you.', attr:'Rumi' },
    { text:'You don\'t have to see the whole staircase, just take the first step.', attr:'Martin Luther King Jr.' },
    { text:'Almost everything will work again if you unplug it for a few minutes — including you.', attr:'Anne Lamott' },
  ]
};

/* ── STATE ── */
let state = loadState();
let currentRoom = 0;
let currentQuote = 0;
let particles = [];
let audioCtx = null;
let sounds = {};
let soundNodes = {};
let animFrame;

/* ── LOAD/SAVE ── */
function loadState(){
  try {
    const s = JSON.parse(localStorage.getItem('still_v3') || '{}');
    return {
      appName:     s.appName     || DEFAULTS.appName,
      welcomeMsg:  s.welcomeMsg  || DEFAULTS.welcomeMsg,
      breatheSpeed:s.breatheSpeed|| DEFAULTS.breatheSpeed,
      rooms:       s.rooms       || DEFAULTS.rooms,
      quotes:      s.quotes      || DEFAULTS.quotes,
    };
  } catch(e){ return {...DEFAULTS}; }
}
function saveState(){
  localStorage.setItem('still_v3', JSON.stringify(state));
}

/* ── AUDIO ENGINE ── */
const SOUNDSCAPES = [
  { id:'rain',  label:'Rain',      freq:null, type:'rain'   },
  { id:'ocean', label:'Ocean',     freq:null, type:'ocean'  },
  { id:'fire',  label:'Fire',      freq:null, type:'fire'   },
  { id:'wind',  label:'Wind',      freq:null, type:'wind'   },
  { id:'bells', label:'Bells',     freq:432,  type:'tone'   },
  { id:'drone', label:'Drone',     freq:110,  type:'drone'  },
];

let soundState = {};
SOUNDSCAPES.forEach(s=>{ soundState[s.id]={on:false,vol:0.3}; });

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}

function makeNoise(type, vol){
  if(!audioCtx) return null;
  const bufSize = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i] = Math.random()*2-1;

  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;

  const gain = audioCtx.createGain();
  gain.gain.value = vol;

  let filter;
  if(type==='rain'){
    filter = audioCtx.createBiquadFilter();
    filter.type='bandpass';filter.frequency.value=2000;filter.Q.value=0.3;
    src.connect(filter);filter.connect(gain);
  } else if(type==='ocean'){
    filter = audioCtx.createBiquadFilter();
    filter.type='lowpass';filter.frequency.value=800;
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value=0.08;lfoGain.gain.value=400;
    lfo.connect(lfoGain);lfoGain.connect(filter.frequency);
    lfo.start();
    src.connect(filter);filter.connect(gain);
  } else if(type==='fire'){
    filter = audioCtx.createBiquadFilter();
    filter.type='lowpass';filter.frequency.value=600;filter.Q.value=0.5;
    src.connect(filter);filter.connect(gain);
  } else if(type==='wind'){
    filter = audioCtx.createBiquadFilter();
    filter.type='bandpass';filter.frequency.value=400;filter.Q.value=0.2;
    src.connect(filter);filter.connect(gain);
  } else {
    src.connect(gain);
  }
  gain.connect(audioCtx.destination);
  src.start();
  return {src,gain};
}

function makeTone(freq, vol, type='sine'){
  if(!audioCtx) return null;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const rev = audioCtx.createConvolver();
  osc.frequency.value = freq;
  osc.type = type;
  gain.gain.value = vol * 0.3;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  return {src:osc,gain};
}

function makeDrone(freq, vol){
  if(!audioCtx) return null;
  const nodes = [];
  [1,2,3,5].forEach((mult,i)=>{
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.frequency.value = freq * mult;
    osc.type = i===0?'sine':'triangle';
    g.gain.value = vol * (0.4 / (i+1));
    osc.connect(g);g.connect(audioCtx.destination);
    osc.start();
    nodes.push({src:osc,gain:g});
  });
  return nodes;
}

function toggleSound(id){
  initAudio();
  const ss = soundState[id];
  const sc = SOUNDSCAPES.find(s=>s.id===id);
  if(!ss.on){
    ss.on=true;
    if(sc.type==='rain'||sc.type==='ocean'||sc.type==='fire'||sc.type==='wind'){
      soundNodes[id] = makeNoise(sc.type, ss.vol);
    } else if(sc.type==='tone'){
      soundNodes[id] = makeTone(sc.freq, ss.vol);
    } else if(sc.type==='drone'){
      soundNodes[id] = makeDrone(sc.freq, ss.vol);
    }
  } else {
    ss.on=false;
    const n = soundNodes[id];
    if(n){
      const kill = arr => (arr||[]).forEach(x=>{ try{x.src.stop();}catch(e){} });
      if(Array.isArray(n)) kill(n);
      else try{n.src.stop();}catch(e){}
      soundNodes[id]=null;
    }
  }
  renderSoundPanel();
}

function setVol(id, val){
  soundState[id].vol = val;
  const n = soundNodes[id];
  if(n){
    if(Array.isArray(n)) n.forEach(x=>{ x.gain.gain.setTargetAtTime(val*0.4/(n.indexOf(x)+1),audioCtx.currentTime,0.1); });
    else n.gain.gain.setTargetAtTime(val,audioCtx.currentTime,0.1);
  }
}

/* ── CANVAS PARTICLES ── */
function initCanvas(){
  const c = document.getElementById('bg');
  const ctx = c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();
  window.addEventListener('resize',resize);

  particles=[];
  const room = state.rooms[currentRoom]||state.rooms[0];
  const pColor = room.particle||'rgba(255,255,255,0.1)';

  for(let i=0;i<60;i++){
    particles.push({
      x:Math.random()*innerWidth,
      y:Math.random()*innerHeight,
      r:Math.random()*2+0.5,
      vx:(Math.random()-0.5)*0.2,
      vy:(Math.random()-0.5)*0.15,
      o:Math.random()*0.6+0.1,
      po:Math.random()*Math.PI*2,
    });
  }

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const room2 = state.rooms[currentRoom]||state.rooms[0];
    const pc = room2.particle||'rgba(255,255,255,0.1)';

    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.po+=0.008;
      if(p.x<-10) p.x=c.width+10;
      if(p.x>c.width+10) p.x=-10;
      if(p.y<-10) p.y=c.height+10;
      if(p.y>c.height+10) p.y=-10;
      const op = (Math.sin(p.po)+1)/2 * p.o;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = pc.replace(/[\d.]+\)$/,`${op.toFixed(2)})`);
      ctx.fill();
    });
    animFrame = requestAnimationFrame(draw);
  }
  if(animFrame) cancelAnimationFrame(animFrame);
  draw();
}

/* ── ROOM SWITCHING ── */
function switchRoom(idx){
  currentRoom = idx;
  const room = state.rooms[idx]||state.rooms[0];

  document.getElementById('room-overlay').style.background =
    `radial-gradient(ellipse at 50% 60%, ${room.color}cc 0%, transparent 80%)`;

  document.body.style.background = room.color;

  document.querySelectorAll('.room-btn').forEach((b,i)=>{
    b.classList.toggle('active', i===idx);
  });
}

/* ── QUOTES ── */
function showQuote(idx){
  const q = state.quotes[idx];
  if(!q) return;
  const qt = document.getElementById('quote-text');
  const qa = document.getElementById('quote-attr');
  qt.classList.add('hidden'); qa.classList.add('hidden');
  setTimeout(()=>{
    qt.textContent = q.text||'';
    qa.textContent = q.attr ? `— ${q.attr}` : '';
    qt.classList.remove('hidden'); qa.classList.remove('hidden');
  }, 350);
  renderDots();
}

function nextQuote(){
  currentQuote = (currentQuote+1)%state.quotes.length;
  showQuote(currentQuote);
}
function prevQuote(){
  currentQuote = (currentQuote-1+state.quotes.length)%state.quotes.length;
  showQuote(currentQuote);
}

function renderDots(){
  const container = document.getElementById('quote-dots');
  const max = Math.min(state.quotes.length,7);
  container.innerHTML='';
  for(let i=0;i<max;i++){
    const d=document.createElement('div');
    d.className='qdot'+(i===currentQuote%max?' active':'');
    container.appendChild(d);
  }
}

/* ── ROOMS BAR ── */
function renderRooms(){
  const bar = document.getElementById('rooms-scroll');
  bar.innerHTML='';
  state.rooms.forEach((r,i)=>{
    const btn=document.createElement('button');
    btn.className='room-btn'+(i===currentRoom?' active':'');
    btn.innerHTML=`<span class="room-icon">${r.icon}</span><span class="room-name">${r.name}</span>`;
    btn.onclick=()=>switchRoom(i);
    bar.appendChild(btn);
  });
}

/* ── SOUND PANEL ── */
function renderSoundPanel(){
  const list = document.getElementById('sound-list');
  list.innerHTML='';
  SOUNDSCAPES.forEach(sc=>{
    const ss=soundState[sc.id];
    const row=document.createElement('div');
    row.className='sound-item';
    row.innerHTML=`
      <span class="sound-label">${sc.label}</span>
      <div class="sound-controls">
        <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="${ss.vol}"
          oninput="setVol('${sc.id}',parseFloat(this.value))">
        <button class="sound-toggle${ss.on?' on':''}" onclick="toggleSound('${sc.id}')">${ss.on?'◼':'▶'}</button>
      </div>`;
    list.appendChild(row);
  });
}
function openSound(){ renderSoundPanel(); document.getElementById('sound-panel').classList.add('open'); }
function closeSound(){ document.getElementById('sound-panel').classList.remove('open'); }

/* ── EDIT PANEL ── */
function openEdit(){
  document.getElementById('e-name').value = state.appName;
  document.getElementById('e-quotes').value = state.quotes.map(q=>q.attr?`${q.text} | ${q.attr}`:q.text).join('\n');
  document.getElementById('e-rooms').value = state.rooms.map(r=>`${r.icon} | ${r.name} | ${r.color}`).join('\n');
  document.getElementById('e-msg').value = state.welcomeMsg;
  const bSlider = document.getElementById('e-breathe');
  bSlider.value = state.breatheSpeed;
  document.getElementById('e-breathe-val').textContent = state.breatheSpeed+'s';
  bSlider.oninput = function(){ document.getElementById('e-breathe-val').textContent=this.value+'s'; };
  document.getElementById('edit-panel').classList.add('open');
}
function closeEdit(){ document.getElementById('edit-panel').classList.remove('open'); }

function saveEdit(){
  const name = document.getElementById('e-name').value.trim() || 'Still';
  const qRaw = document.getElementById('e-quotes').value.split('\n').filter(l=>l.trim());
  const quotes = qRaw.map(l=>{
    const parts = l.split('|'); return {text:parts[0].trim(), attr:(parts[1]||'').trim()};
  }).filter(q=>q.text);

  const rRaw = document.getElementById('e-rooms').value.split('\n').filter(l=>l.trim());
  const rooms = rRaw.map(l=>{
    const p = l.split('|');
    const icon = (p[0]||'🌙').trim();
    const rname = (p[1]||'Room').trim();
    const color = (p[2]||'#0a0a0f').trim();
    const hsl = hexToHsl(color);
    const particle = `hsla(${hsl.h},${hsl.s}%,70%,0.13)`;
    return {icon,name:rname,color,particle};
  }).filter(r=>r.name);

  state.appName = name;
  state.quotes = quotes.length ? quotes : DEFAULTS.quotes;
  state.rooms = rooms.length ? rooms : DEFAULTS.rooms;
  state.welcomeMsg = document.getElementById('e-msg').value.trim() || DEFAULTS.welcomeMsg;
  state.breatheSpeed = parseInt(document.getElementById('e-breathe').value)||8;

  document.getElementById('logo').textContent = name;
  document.title = name;
  document.querySelector('.breathe-ring') && (document.getElementById('breathe-ring').style.animationDuration = state.breatheSpeed+'s');

  saveState();
  renderRooms();
  currentRoom = Math.min(currentRoom, state.rooms.length-1);
  switchRoom(currentRoom);
  currentQuote = 0;
  showQuote(0);
  closeEdit();
  toast('Saved ✦');
}

function hexToHsl(hex){
  let r=0,g=0,b=0;
  if(hex.length===4){hex='#'+hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3];}
  r=parseInt(hex.slice(1,3),16)/255;
  g=parseInt(hex.slice(3,5),16)/255;
  b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h=0,s=0,l=(max+min)/2;
  if(max!==min){
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    if(max===r) h=(g-b)/d+(g<b?6:0);
    else if(max===g) h=(b-r)/d+2;
    else h=(r-g)/d+4;
    h/=6;
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

/* ── TOAST ── */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── AUTO QUOTE CYCLE ── */
let quoteTimer;
function startQuoteCycle(){
  clearInterval(quoteTimer);
  quoteTimer = setInterval(nextQuote, 18000);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nextQuote();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prevQuote();
  if(e.key==='Escape'){ closeSound(); closeEdit(); }
  if(e.key==' ') { e.preventDefault(); nextQuote(); }
});

/* ── SWIPE ── */
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){ if(dx>0) prevQuote(); else nextQuote(); }
},{passive:true});

/* ── ENTER ── */
function enter(){
  initAudio();
  document.getElementById('splash').classList.add('gone');
  const app=document.getElementById('app');
  app.classList.add('active');
  initCanvas();
  toast(state.welcomeMsg);
  startQuoteCycle();
}

/* ── INIT ── */
(function init(){
  document.getElementById('logo').textContent = state.appName;
  document.title = state.appName;
  document.getElementById('breathe-ring').style.animationDuration = state.breatheSpeed+'s';
  renderRooms();
  switchRoom(0);
  showQuote(0);
})();

/* ── SERVICE WORKER registration (skip if no sw.js) ── */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
